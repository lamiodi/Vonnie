services:
  # Backend Service
  # The repo root is the vone-x2x directory.
  # rootDir is relative to the repo root, so the backend path is:
  #   backend
  - type: web
    name: vonne-x2x-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: cross-env NODE_ENV=production PORT=5010 node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5010
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false

  # Frontend Service
  # rootDir is relative to the repo root, so the frontend path is:
  #   frontend
  - type: web
    name: vonne-x2x-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false